<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yiğit Dublaj Stüdyosu - Üyeli Sistem</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; display: inline-block; border: 1px solid #333; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; }
        #loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .auth-box { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #f1c40f; width: 320px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #2d2d2d; color: white; width: 90%; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; margin: 5px; }
        .btn-main { background: #f1c40f; color: black; width: 100%; }
        .btn-link { background: none; color: #3498db; text-decoration: underline; font-size: 13px; }
        #chatBox { background: #121212; height: 180px; border: 1px solid #444; margin-top: 15px; border-radius: 8px; overflow-y: auto; padding: 10px; text-align: left; }
        .msg { margin-bottom: 8px; padding: 5px 10px; border-radius: 4px; background: #333; font-size: 14px; }
        .user-tag { font-size: 10px; color: #f1c40f; display: block; font-weight: bold; }
        #recordTimer { font-size: 24px; font-weight: bold; color: #f1c40f; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="auth-box" id="authBox">
            <h2 id="authTitle" style="color:#f1c40f;">Giriş Yap</h2>
            <input type="text" id="userInput" placeholder="Kullanıcı Adı">
            <input type="password" id="passInput" placeholder="Şifre">
            <button class="btn-main" id="authBtn" onclick="handleAuth()">Giriş Yap</button>
            <button class="btn-link" id="toggleBtn" onclick="toggleAuth()">Hesabın yok mu? Kayıt Ol</button>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <h2 id="welcomeText">🎙 Hoş Geldin</h2>
        <div style="background:#252525; padding:10px; border-radius:8px; margin-bottom:10px;">
            ID: <span id="myIdDisplay" style="color:#f1c40f; font-size:12px;">Yükleniyor...</span>
        </div>

        <input type="text" id="remoteId" placeholder="Bağlanılacak ID">
        <button onclick="startCall()" style="background:#f1c40f; color:black; width:95%;">DM ve Sesli Bağlan</button>
        <button onclick="location.reload()" style="background:#e74c3c; color:white; width:95%;">Bağlantıyı Kes ❌</button>

        <div id="chatBox"></div>
        <input type="text" id="msgInput" placeholder="Mesajını yaz..." style="width:70%; margin-top:10px;">
        <button onclick="sendMessage()" style="background:#2ecc71; color:white;">Gönder</button>

        <hr style="border:0; border-top:1px solid #444; margin:20px 0;">
        <h3>Ödev Kaydı</h3>
        <div id="recordTimer">00:00</div>
        <button id="startBtn" onclick="startRecording()" style="background:#2ecc71; color:white;">Başlat</button>
        <button id="stopBtn" onclick="stopRecording()" style="background:#e74c3c; color:white;" disabled>Durdur</button>
        <div id="audioArea"></div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
