<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yiğit Dublaj Kursu - Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; display: inline-block; border: 1px solid #333; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .id-box { background: #252525; border: 1px dashed #f1c40f; padding: 10px; margin: 15px 0; border-radius: 8px; }
        #myIdDisplay { color: #f1c40f; font-weight: bold; font-size: 13px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        #copyBtn { background: #3498db; color: white; font-size: 11px; }
        #callBtn { background: #f1c40f; color: black; width: 90%; margin-top: 10px; }
        #hangupBtn { background: #e74c3c; color: white; width: 90%; margin-top: 10px; display: none; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #2d2d2d; color: white; width: 80%; }
        #chatBox { background: #121212; height: 200px; border: 1px solid #444; margin-top: 15px; border-radius: 8px; overflow-y: auto; padding: 10px; text-align: left; }
        .msg { margin-bottom: 8px; padding: 5px 10px; border-radius: 4px; background: #333; width: fit-content; max-width: 80%; }
        #loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #recordTimer { font-size: 24px; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        .user-tag { font-size: 10px; color: #aaa; display: block; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI (Username + Şifre) -->
    <div id="loginOverlay">
        <h1 style="color:#f1c40f;">🎙 Yiğit Dublaj Stüdyosu</h1>
        <input type="text" id="userInput" placeholder="Kullanıcı Adın (Örn: Can)" style="width: 250px; margin-bottom: 10px;">
        <input type="password" id="passInput" placeholder="Sistem Şifresi" style="width: 250px; margin-bottom: 15px;">
        <button onclick="checkPass()" style="background:#f1c40f; color:black; padding: 10px 40px;">Sisteme Gir</button>
    </div>

    <div class="container">
        <h2 id="welcomeText">🎙 Hoş Geldin Reis</h2>
        
        <div class="id-box">
            Senin Numaran (DM İçin):<br>
            <span id="myIdDisplay">Yükleniyor...</span><br>
            <button id="copyBtn">ID Kopyala 📋</button>
        </div>

        <div style="background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <p style="margin:0 0 10px 0; font-size: 14px; color: #f1c40f;">Hocaya DM At / Bağlan</p>
            <input type="text" id="remoteId" placeholder="Hocanın ID'sini buraya yapıştır">
            <button id="callBtn">DM Başlat + Sesli</button>
            <button id="hangupBtn">DM'den Çık ❌</button>
        </div>

        <div id="chatBox"><i>DM Kutusu Boş...</i></div>
        <div style="margin-top:10px;">
            <input type="text" id="msgInput" placeholder="Mesajını yaz..." style="width: 70%;">
            <button id="sendBtn" style="background: #2ecc71; color: white;">Gönder</button>
        </div>

        <hr style="margin:25px 0; border:0; border-top:1px solid #444;">
        
        <h3>🎙 Ödev Kaydı</h3>
        <div id="recordTimer">00:00</div>
        <button id="start" style="background: #2ecc71; color: white;">Kayda Başlat</button>
        <button id="stop" style="background: #e74c3c; color: white;" disabled>Durdur</button>
        <div id="audioArea" style="margin-top:15px;"></div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
