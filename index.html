<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dublaj Akademisi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header { 
            background: rgba(0,0,0,0.8); 
            padding: 15px 0; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .buttons { display: flex; gap: 10px; }
        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.3s;
        }
        .login-btn { background: #f97316; color: white; }
        .login-btn:hover { transform: scale(1.05); }
        .user-info { background: #10b981; color: white; display: flex; gap: 10px; align-items: center; }
        
        /* Modal */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 1000;
        }
        .modal-content { 
            background: white; 
            color: #333; 
            margin: 100px auto; 
            padding: 30px; 
            width: 90%; 
            max-width: 400px; 
            border-radius: 15px;
            position: relative;
        }
        .close { position: absolute; right: 15px; top: 15px; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .switch-form { text-align: center; margin-top: 20px; }
        
        /* Sections */
        section { padding: 60px 0; text-align: center; }
        h1 { font-size: 3em; margin-bottom: 20px; }
        h2 { font-size: 2.5em; margin-bottom: 30px; }
        .hero { background: rgba(0,0,0,0.3); }
        .btn-primary { background: #ef4444; color: white; font-size: 18px; padding: 15px 30px; }
        .btn-primary:hover { background: #dc2626; transform: scale(1.05); }
        .btn-secondary { background: #3b82f6; color: white; }
        
        /* Studio */
        .studio { background: #1f2937; }
        .controls { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .slider-group { text-align: left; }
        .slider { width: 200px; }
        .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .preset-btn { background: #6b7280; color: white; padding: 10px; border-radius: 8px; }
        .preset-btn.active { background: #f59e0b; }
        .record-section { background: #111827; padding: 30px; border-radius: 15px; margin-top: 30px; }
        #waveform { height: 100px; background: #374151; border-radius: 10px; margin: 20px 0; }
        
        /* Chat */
        .chat-container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.1); padding: 30px; border-radius: 15px; }
        .messages { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .message { margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border-radius: 25px; border: none; }
        
        /* Responsive */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 15px; }
            h1 { font-size: 2em; }
            .controls { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">🎙️ Dublaj Akademisi</div>
            <div class="buttons">
                <button id="loginBtn" class="login-btn">Giriş Yap</button>
                <div id="userInfo" class="user-info" style="display:none;">
                    <span id="userName"></span>
                    <button id="logoutBtn">Çıkış</button>
                </div>
            </div>
        </nav>
    </header>

    <div class="container">
        <!-- Hero -->
        <section class="hero">
            <h1>Profesyonel Dublaj Kursu</h1>
            <p>Ses değiştirme, dublaj teknikleri ve stüdyo deneyimi</p>
            <br>
            <button id="demoBtn" class="btn-primary">🎵 Demo Dinle</button>
            <button id="startBtn" class="btn-secondary">🚀 Hemen Başla</button>
        </section>

        <!-- Login Modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <form id="authForm">
                    <h2 id="modalTitle">Giriş Yap</h2>
                    <div class="form-group">
                        <input type="text" id="username" placeholder="Kullanıcı adı" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Şifre" required>
                    </div>
                    <button type="submit" class="login-btn" style="width:100%; margin-top:10px;">Giriş Yap</button>
                    <div class="switch-form">
                        <a href="#" id="toggleForm">Kayıt Ol</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Studio -->
        <section id="studio" class="studio" style="display:none;">
            <h2>🎤 Dublaj Stüdyosu</h2>
            <div class="controls">
                <div class="slider-group">
                    <label>Pitch: <span id="pitchVal">0</span></label><br>
                    <input type="range" class="slider" id="pitch" min="-50" max="50" value="0">
                </div>
                <div class="slider-group">
                    <label>Ses Efekti: <span id="effectVal">0</span></label><br>
                    <input type="range" class="slider" id="effect" min="0" max="100" value="0">
                </div>
            </div>
            <div class="preset-grid">
                <button class="preset-btn active" data-pitch="0" data-effect="0">Normal</button>
                <button class="preset-btn" data-pitch="25" data-effect="30">Kadın</button>
                <button class="preset-btn" data-pitch="-40" data-effect="50">Çocuk</button>
                <button class="preset-btn" data-pitch="15" data-effect="70">Yaşlı</button>
            </div>
            <div class="record-section">
                <button id="recordBtn" class="btn-primary">🎙️ Kaydı Başlat</button>
                <button id="stopBtn" style="display:none;">⏹️ Durdur</button>
                <button id="playBtn" style="display:none;">▶️ Dinle</button>
                <div id="status">Hazır</div>
                <canvas id="waveform" width="800" height="100"></canvas>
            </div>
        </section>

        <!-- Chat -->
        <section id="chat" style="display:none;">
            <h2>💬 Canlı Ders</h2>
            <div class="chat-container">
                <div id="messages" class="messages"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Ders sorusu sor...">
                    <button id="sendBtn">Gönder</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // GLOBAL DEĞİŞKENLER
        let currentUser = localStorage.getItem('dublajUser');
        let isRecording = false;
        let mediaRecorder, chunks = [], audioBlob;
        let canvas = document.getElementById('waveform');
        let ctx = canvas.getContext('2d');

        // DOM ELEMANLARI
        const loginBtn = document.getElementById('loginBtn');
        const modal = document.getElementById('modal');
        const authForm = document.getElementById('authForm');
        const toggleForm = document.getElementById('toggleForm');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const logoutBtn = document.getElementById('logoutBtn');
        const demoBtn = document.getElementById('demoBtn');
        const startBtn = document.getElementById('startBtn');
        const studio = document.getElementById('studio');
        const chat = document.getElementById('chat');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const pitch = document.getElementById('pitch');
        const effect = document.getElementById('effect');
        const pitchVal = document.getElementById('pitchVal');
        const effectVal = document.getElementById('effectVal');
        const messages = document.getElementById('messages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // OLAY DİNLEYİCİLERİ - HER ŞEY BURADA!
        loginBtn.onclick = () => modal.style.display = 'block';
        document.querySelector('.close').onclick = () => modal.style.display = 'none';
        demoBtn.onclick = () => {
            alert('🎵 Demo sesi oynatılıyor...\n\n(Ses değiştirme efekti aktif!)');
            playDemoSound();
        };
        startBtn.onclick = () => {
            if (!currentUser) {
                alert('🚀 Başlamak için giriş yap!');
                modal.style.display = 'block';
            } else {
                studio.style.display = 'block';
                studio.scrollIntoView();
            }
        };

        authForm.onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (document.getElementById('modalTitle').textContent === 'Kayıt Ol') {
                localStorage.setItem('dublajUser', user);
                alert('✅ Kayıt başarılı!');
            } else {
                localStorage.setItem('dublajUser', user);
                alert('🎉 Giriş başarılı ' + user + '!');
            }
            currentUser = user;
            updateUI();
            modal.style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        };

        toggleForm.onclick = (e) => {
            e.preventDefault();
            const title = document.getElementById('modalTitle');
            if (title.textContent === 'Giriş Yap') {
                title.textContent = 'Kayıt Ol';
                toggleForm.textContent = 'Giriş Yap';
            } else {
                title.textContent = 'Giriş Yap';
                toggleForm.textContent = 'Kayıt Ol';
            }
        };

        logoutBtn.onclick = () => {
            localStorage.removeItem('dublajUser');
            currentUser = null;
            updateUI();
            studio.style.display = 'none';
            chat.style.display = 'none';
        };

        recordBtn.onclick = startRecord;
        stopBtn.onclick = stopRecord;
        playBtn.onclick = playRecord;
        sendBtn.onclick = sendMessage;
        chatInput.onkeypress = (e) => e.key === 'Enter' && sendMessage();

        // PRESET BUTONLARI
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                pitch.value = btn.dataset.pitch;
                effect.value = btn.dataset.effect;
                pitchVal.textContent = btn.dataset.pitch;
                effectVal.textContent = btn.dataset.effect;
            };
        });

        // SLIDERLAR
        pitch.oninput = () => pitchVal.textContent = pitch.value;
        effect.oninput = () => effectVal.textContent = effect.value;

        // FONKSİYONLAR
        function updateUI() {
            if (currentUser) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                userName.textContent = currentUser;
            } else {
                loginBtn.style.display = 'inline-block';
                userInfo.style.display = 'none';
            }
        }

        async function startRecord() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];

                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(chunks, { type: 'audio/webm' });
                    playBtn.style.display = 'inline-block';
                    status.textContent = '✅ Kayıt tamam! Dinle';
                    status.style.color = '#10b981';
                    animateWaveform();
                };

                mediaRecorder.start();
                isRecording = true;
                recordBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                status.textContent = '🔴 Kaydediyor...';
                status.style.color = '#ef4444';
            } catch (err) {
                alert('❌ Mikrofon izni gerekli!');
            }
        }

        function stopRecord() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            }
        }

        function playRecord() {
            if (audioBlob) {
                const audio = new Audio(URL.createObjectURL(audioBlob));
                audio.play();
                status.textContent = '▶️ Çalıyor...';
            }
        }

        function playDemoSound() {
            // Demo ses efekti
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
            oscillator.frequency.linearRampToValueAtTime(880, audioContext.currentTime + 0.5);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 1);
        }

        function animateWaveform() {
            const bars = 50;
            const barWidth = canvas.width / bars;
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < bars; i++) {
                    const height = Math.random() * 80 + 20;
                    ctx.fillStyle = `hsl(${i * 7}, 70%, 50%)`;
                    ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 2, height);
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        function sendMessage() {
            const msg = chatInput.value.trim();
            if (!msg) return;
            
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<strong>Sen:</strong> ${msg}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            chatInput.value = '';
            
            setTimeout(() => {
                const reply = document.createElement('div');
                reply.className = 'message';
                reply.innerHTML = '<strong>🎤 Hocam:</strong> Harika ses! Nefes kontrolün mükemmel.';
                messages.appendChild(reply);
                messages.scrollTop = messages.scrollHeight;
            }, 1000);
        }

        // BAŞLANGIÇ
        updateUI();
        console.log('✅ DÜBLÂJ AKADEMİSİ HAZIR! Tüm butonlar çalışıyor.');
        console.log('Test: Demo Dinle →
