<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yiğit Dublaj Kursu - Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; display: inline-block; border: 1px solid #333; width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .id-box { background: #252525; border: 1px dashed #f1c40f; padding: 10px; margin: 15px 0; border-radius: 8px; }
        #myIdDisplay { color: #f1c40f; font-weight: bold; font-size: 13px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        #copyBtn { background: #3498db; color: white; font-size: 11px; }
        #callBtn { background: #f1c40f; color: black; width: 90%; margin-top: 10px; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #2d2d2d; color: white; width: 80%; }
        
        /* Mesajlaşma Alanı */
        #chatBox { background: #121212; height: 150px; border: 1px solid #444; margin-top: 15px; border-radius: 8px; overflow-y: auto; padding: 10px; text-align: left; font-size: 14px; }
        .msg { margin-bottom: 5px; padding: 5px 10px; border-radius: 4px; background: #333; width: fit-content; }
        .msg-hoca { background: #f1c40f; color: black; align-self: flex-end; }
        
        #start { background: #27ae60; color: white; }
        #stop { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎙️ Yiğit Dublaj</h1>
        
        <div class="id-box">
            <span style="font-size:12px; color:#888;">Senin Numaran:</span><br>
            <span id="myIdDisplay">Yükleniyor...</span><br>
            <button id="copyBtn">Kopyala 📋</button>
        </div>

        <input type="text" id="remoteId" placeholder="Hocanın numarasını buraya yapıştır">
        <button id="callBtn">Hocaya Bağlan (Sesli + Mesaj)</button>

        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">

        <!-- Mesajlaşma Bölümü -->
        <div id="chatBox"><i>Mesajlar burada görünecek...</i></div>
        <input type="text" id="msgInput" placeholder="Mesajını yaz..." style="width:70%; margin-top:10px;">
        <button id="sendBtn" style="background:#2ecc71; color:white;">Gönder</button>

        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">

        <p><strong>Ödev Kaydı:</strong></p>
        <button id="start">Kaydı Başlat</button>
        <button id="stop" disabled>Dur</button>
        <div id="audioArea" style="margin-top:15px;"></div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
